<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolus Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f2;
    --surface: #ffffff;
    --surface2: #e8e8e4;
    --border: rgba(0,0,0,0.2);
    --border2: rgba(0,0,0,0.4);
    --text: #0a0a08;
    --text2: #3a3a36;
    --text3: #6a6a64;
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'Courier New', Courier, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 1.5rem 1rem 4rem; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .header { margin-bottom: 1.75rem; }
  .header h1 { font-size: 14px; font-weight: 600; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--mono); margin-bottom: 10px; }

  /* CGM bar */
  .cgm-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .cgm-val { font-size: 32px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .cgm-trend { font-size: 22px; }
  .cgm-right { margin-left: auto; text-align: right; }
  .cgm-label { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .cgm-age { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }

  /* Setup banner */
  .setup-banner { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1rem; font-size: 13px; color: var(--text2); font-family: var(--mono); }
  .setup-banner a { color: var(--text); }
  .proxy-row { display: flex; gap: 8px; margin-top: 8px; }
  .proxy-row input { flex: 1; padding: 7px 10px; font-size: 13px; font-family: var(--mono); border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); }
  .proxy-row input:focus { outline: 2px solid var(--text2); outline-offset: 1px; }
  .proxy-save { padding: 7px 14px; font-size: 13px; font-family: var(--mono); font-weight: 600; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--text); color: var(--surface); cursor: pointer; white-space: nowrap; }
  .proxy-save:hover { opacity: 0.85; }

  /* Form card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; font-family: var(--mono); }
  .quick-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .quick-btn {
    padding: 10px 18px; font-size: 17px; font-family: var(--mono); font-weight: 600;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); color: var(--text); cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  .quick-btn:hover { background: var(--bg); border-color: var(--border2); }
  .quick-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }
  .row { display: flex; align-items: center; gap: 10px; }
  .row input {
    width: 100px; padding: 9px 12px; font-size: 17px; font-family: var(--mono); font-weight: 600;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); color: var(--text);
  }
  .row input:focus { outline: 2px solid var(--text2); outline-offset: 1px; }
  .row span { font-size: 15px; color: var(--text2); font-weight: 500; }
  .note-input {
    width: 100%; padding: 9px 12px; font-size: 15px; font-family: var(--sans);
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface2); color: var(--text);
    resize: none; height: 56px;
  }
  .note-input:focus { outline: 2px solid var(--text2); outline-offset: 1px; }
  .log-btn {
    width: 100%; padding: 13px; font-size: 16px; font-family: var(--mono); font-weight: 600;
    border: 1.5px solid var(--border2); border-radius: var(--radius);
    background: var(--text); color: var(--surface); cursor: pointer;
    letter-spacing: 0.05em; transition: opacity 0.1s;
  }
  .log-btn:hover { opacity: 0.85; }
  .log-btn:active { transform: scale(0.99); }

  /* Log list */
  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .section-label { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); }
  .export-btn { font-size: 13px; color: var(--text2); background: none; border: none; cursor: pointer; font-family: var(--mono); text-decoration: underline; font-weight: 500; }
  .export-btn:hover { color: var(--text); }
  .daily-total { font-size: 14px; font-weight: 600; color: var(--text2); font-family: var(--mono); margin-bottom: 10px; }
  .entry { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .entry:last-child { border-bottom: none; }
  .entry-dose { font-size: 24px; font-weight: 700; color: var(--text); min-width: 60px; font-family: var(--mono); }
  .entry-dose span { font-size: 14px; font-weight: 500; color: var(--text2); }
  .entry-meta { flex: 1; }
  .entry-time { font-size: 14px; font-weight: 500; color: var(--text2); font-family: var(--mono); }
  .entry-note { font-size: 13px; color: var(--text3); font-style: italic; margin-top: 3px; }
  .entry-del { font-size: 22px; color: var(--text3); cursor: pointer; padding: 4px 8px; line-height: 1; }
  .entry-del:hover { color: var(--text); }
  .empty { text-align: center; padding: 2.5rem 0; font-size: 15px; color: var(--text3); font-family: var(--mono); }

  /* IOB bar */
  .iob-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-top: 8px; }
  .iob-val { font-size: 32px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .iob-unit { font-size: 14px; font-weight: 500; color: var(--text2); align-self: flex-end; margin-bottom: 5px; }
  .iob-right { margin-left: auto; text-align: right; }
  .iob-label { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .iob-track { width: 80px; height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 6px; margin-left: auto; }
  .iob-fill { height: 4px; background: var(--text2); border-radius: 2px; transition: width 0.5s; }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--surface); font-size: 14px; font-family: var(--mono); font-weight: 600;
    padding: 10px 22px; border-radius: var(--radius); opacity: 0;
    transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>bolus log</h1>

    <div class="cgm-bar">
      <div class="cgm-val" id="cgmVal">—</div>
      <div class="cgm-trend" id="cgmTrend"></div>
      <div class="cgm-right">
        <div class="cgm-label" id="cgmLabel">no proxy configured</div>
        <div class="cgm-age" id="cgmAge"></div>
      </div>
    </div>
  </div>

    <div class="iob-bar">
      <div class="iob-val" id="iobVal">0.0</div>
      <div class="iob-unit">u IOB</div>
      <div class="iob-right">
        <div class="iob-label">insulin on board</div>
        <div class="iob-track"><div class="iob-fill" id="iobFill" style="width:0%"></div></div>
      </div>
    </div>

  <div class="card">
    <div class="field">
      <label>Units</label>
      <div class="quick-row">
        <button class="quick-btn" onclick="selectDose(1)">1</button>
        <button class="quick-btn" onclick="selectDose(2)">2</button>
        <button class="quick-btn" onclick="selectDose(3)">3</button>
        <button class="quick-btn" onclick="selectDose(4)">4</button>
        <button class="quick-btn" onclick="selectDose(5)">5</button>
        <button class="quick-btn" onclick="selectDose(6)">6</button>
        <button class="quick-btn" onclick="selectDose(8)">8</button>
        <button class="quick-btn" onclick="selectDose(10)">10</button>
      </div>
      <div class="row">
        <input type="number" id="doseInput" min="0.5" max="50" step="0.5" placeholder="—" />
        <span>units</span>
      </div>
    </div>
    <div class="field">
      <label>Blood glucose (mg/dL)</label>
      <div class="row">
        <input type="number" id="bgInput" min="40" max="400" step="1" placeholder="—" />
        <span>mg/dL</span>
      </div>
    </div>
    <div class="field">
      <label>Note (optional)</label>
      <textarea class="note-input" id="noteInput" placeholder="meal, correction, etc."></textarea>
    </div>
    <button class="log-btn" onclick="logDose()">+ log bolus</button>
  </div>

  <div>
    <div class="list-header">
      <div class="section-label">today</div>
      <button class="export-btn" onclick="exportCSV()">export csv</button>
    </div>
    <div class="daily-total" id="dailyTotal"></div>
    <div class="card" style="padding: 0 1.25rem;" id="entryList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROXY = 'https://dexcom-proxy-py.onrender.com';

// ── IOB calculation (Novolog: peak 75min, duration 195min) ──
// Full dose counted immediately, linear decay from peak to zero
const PEAK_MIN = 75, DURATION_MIN = 195;
function doseIOB(dose, ageMin) {
  if (ageMin < 0 || ageMin >= DURATION_MIN) return 0;
  if (ageMin < PEAK_MIN) return dose;
  return dose * (1 - (ageMin - PEAK_MIN) / (DURATION_MIN - PEAK_MIN));
}
function calcIOB(entries) {
  const now = Date.now();
  let total = 0, maxPossible = 0;
  entries.forEach(e => {
    const ageMin = (now - new Date(e.ts).getTime()) / 60000;
    total += doseIOB(e.dose, ageMin);
    maxPossible += e.dose;
  });
  const iobEl = document.getElementById('iobVal');
  const fillEl = document.getElementById('iobFill');
  if (iobEl) iobEl.textContent = total.toFixed(1);
  if (fillEl) fillEl.style.width = maxPossible > 0 ? Math.min(100, (total / maxPossible) * 100).toFixed(1) + '%' : '0%';
}

// ── State ─────────────────────────────────────────────────
let entries = [];
let selectedDose = null;
let pollTimer = null;
let lastFetch = null;

// ── Server entry sync ─────────────────────────────────────
async function loadEntries() {
  try {
    const r = await fetch(PROXY + '/entries', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    entries = await r.json();
    render();
    calcIOB(entries);
  } catch(e) {
    console.error('loadEntries failed:', e);
  }
}

async function saveEntry(entry) {
  await fetch(PROXY + '/entries', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry)
  });
}

async function removeEntry(id) {
  await fetch(PROXY + '/entries/' + id, { method: 'DELETE' });
}

// ── Dexcom polling ────────────────────────────────────────
async function fetchBG() {
  try {
    const r = await fetch(PROXY + '/bg', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    lastFetch = Date.now();
    document.getElementById('cgmVal').textContent = data.value;
    document.getElementById('cgmTrend').textContent = data.trend;
    document.getElementById('cgmLabel').textContent = 'mg/dL · live';
    document.getElementById('bgInput').value = data.value;
    updateAge();
  } catch(e) {
    document.getElementById('cgmLabel').textContent = 'fetch failed';
  }
}

function updateAge() {
  if (!lastFetch) return;
  const mins = Math.round((Date.now() - lastFetch) / 60000);
  document.getElementById('cgmAge').textContent = mins < 1 ? 'just now' : mins + 'm ago';
}

function startPolling() {
  fetchBG();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(fetchBG, 60000);
  setInterval(updateAge, 30000);
  setInterval(() => calcIOB(entries), 30000);
}

// ── Dose selection ────────────────────────────────────────
function selectDose(v) {
  selectedDose = v;
  document.getElementById('doseInput').value = v;
  document.querySelectorAll('.quick-btn').forEach(b =>
    b.classList.toggle('active', parseFloat(b.textContent) === v));
}

document.getElementById('doseInput').addEventListener('input', function() {
  selectedDose = parseFloat(this.value) || null;
  document.querySelectorAll('.quick-btn').forEach(b =>
    b.classList.toggle('active', parseFloat(b.textContent) === selectedDose));
});

// ── Logging ───────────────────────────────────────────────
async function logDose() {
  const dose = parseFloat(document.getElementById('doseInput').value);
  if (!dose || dose <= 0) { showToast('enter a dose'); return; }
  const bg = parseFloat(document.getElementById('bgInput').value) || null;
  const note = document.getElementById('noteInput').value.trim();
  const entry = { id: Date.now(), dose, bg, note, ts: new Date().toISOString() };
  entries.unshift(entry);
  render();
  calcIOB(entries);
  document.getElementById('doseInput').value = '';
  document.getElementById('noteInput').value = '';
  selectedDose = null;
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  showToast(dose + 'u logged');
  await saveEntry(entry);
}

async function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  render();
  calcIOB(entries);
  await removeEntry(id);
}

function fmt(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const today = new Date().toDateString();
  const todayEntries = entries.filter(e => new Date(e.ts).toDateString() === today);
  const list = document.getElementById('entryList');
  const totalEl = document.getElementById('dailyTotal');
  if (!todayEntries.length) {
    list.innerHTML = '<div class="empty">no entries yet today</div>';
    totalEl.textContent = '';
    return;
  }
  const total = todayEntries.reduce((s, e) => s + e.dose, 0);
  totalEl.textContent = total.toFixed(1) + 'u total today';
  list.innerHTML = todayEntries.map(e => `
    <div class="entry">
      <div class="entry-dose">${e.dose}<span>u</span></div>
      <div class="entry-meta">
        <div class="entry-time">${fmt(e.ts)}${e.bg ? ' &nbsp;·&nbsp; ' + e.bg + ' mg/dL' : ''}</div>
        ${e.note ? '<div class="entry-note">' + e.note + '</div>' : ''}
      </div>
      <span class="entry-del" onclick="deleteEntry(${e.id})">&times;</span>
    </div>`).join('');
}

// ── Export ────────────────────────────────────────────────
function exportCSV() {
  if (!entries.length) { showToast('nothing to export'); return; }
  const rows = [['timestamp','dose_units','bg_mgdl','note'],
    ...entries.map(e => [e.ts, e.dose, e.bg || '', e.note || ''])];
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'bolus_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('exported');
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ── Init ──────────────────────────────────────────────────
startPolling();
loadEntries();
</script>
</body>
</html>
